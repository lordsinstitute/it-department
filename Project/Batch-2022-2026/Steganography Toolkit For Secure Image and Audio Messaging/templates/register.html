{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-1">Create Account</h4>
        <p class="text-muted mb-4">First registered user becomes <b>Admin</b> automatically.</p>

        <form method="post" autocomplete="off">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" required minlength="3" />
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <input class="form-control" name="password" type="password" required minlength="8" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Confirm</label>
              <input class="form-control" name="confirm" type="password" required minlength="8" />
            </div>
          </div>

          <button class="btn btn-dark w-100 mt-4">Register</button>
          <div class="mt-3 text-center small">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
