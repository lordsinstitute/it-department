{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h3 class="fw-bold">{{ title }}</h3>
        <p class="text-muted mb-4">{{ message }}</p>
        <div class="d-flex gap-2">
          <a class="btn btn-dark" href="{{ url_for('dashboard') }}">Dashboard</a>
          <a class="btn btn-outline-dark" href="{{ url_for('encode') }}">Encode</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
