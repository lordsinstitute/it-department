{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-1">Login</h4>
        <p class="text-muted mb-4">Secure access to encoding operations.</p>
        <form method="post" autocomplete="off">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" required minlength="3" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" name="password" type="password" required minlength="8" />
          </div>
          <button class="btn btn-dark w-100">Sign in</button>
          <div class="mt-3 text-center small">
            No account? <a href="{{ url_for('register') }}">Register</a>
          </div>
        </form>
      </div>
    </div>

    <div class="mt-3 alert alert-secondary border-0 small">
      <b>Note:</b> No email/OAuth/SMTP. Alerts are simulated (UI toasts + terminal).
    </div>
  </div>
</div>
{% endblock %}
