{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body text-center p-5">
                <h2 class="fw-bold mb-3">{{ title }}</h2>
                <p class="text-muted">{{ message }}</p>
                <a href="{{ url_for('main.dashboard') if session.get('user_id') else url_for('auth.login') }}" class="btn btn-primary">
                    Go Back
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
