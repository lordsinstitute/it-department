{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4">
      <h4 class="mb-2">Login</h4>
      <p class="small-muted mb-3">Secure access (hashed passwords).</p>

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-dark w-100">Sign in</button>
      </form>

      <div class="mt-3 small-muted">
        No account? <a href="{{ url_for('register') }}">Register</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
