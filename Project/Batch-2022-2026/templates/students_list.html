{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h3>Registered Students</h3>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Student ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for s in students %}
      <tr>
        <td>{{ s.student_id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.department }}</td>
        <td>
          <a href="{{ url_for('admin.capture_faces', student_id=s.student_id) }}" class="btn btn-sm btn-warning">Capture</a>
          <a href="{{ url_for('admin.delete_student', student_id=s.student_id) }}" class="btn btn-sm btn-danger">Delete</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
