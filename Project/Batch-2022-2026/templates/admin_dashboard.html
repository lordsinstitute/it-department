{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h2>Admin Dashboard</h2>
  <hr>
  <div class="card p-3">
    <p><strong>Total Students:</strong> {{ total_students }}</p>
    <p><strong>Last Model Trained:</strong> {{ last_trained }}</p>
  </div>
  <div class="mt-3">
    <a href="{{ url_for('admin.add_student') }}" class="btn btn-success">Add Student</a>
    <a href="{{ url_for('admin.train_model') }}" class="btn btn-primary">Train Model</a>

  </div>
</div>
{% endblock %}
