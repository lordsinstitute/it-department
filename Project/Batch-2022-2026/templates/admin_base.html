<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Optional Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <style>
        body {
            background-color: #f4f6f9;
        }

        .header-bar {
            background: linear-gradient(90deg, #0d6efd, #084298);
            color: white;
            padding: 15px 20px;
        }

        .header-bar h1 {
            font-size: 1.6rem;
            margin: 0;
        }

        .nav-link {
            font-weight: 500;
        }

        .nav-link.active {
            font-weight: 600;
            border-bottom: 3px solid #0d6efd;
        }

        footer {
            background-color: #ffffff;
            border-top: 1px solid #dee2e6;
            padding: 10px;
            margin-top: 40px;
            font-size: 0.9rem;
        }
    </style>

    {% block head_extra %}{% endblock %}
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header-bar text-center">
    <h1>
        <i class="bi bi-shield-lock-fill"></i>
        DDoS Attack Detection – Admin Panel
    </h1>
</div>

<!-- ================= NAVIGATION ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold text-primary" href="/admin/dashboard">
            Admin
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#adminNavbar"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="adminNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="/admin/eda">
                        <i class="bi bi-bar-chart-fill"></i>
                        EDA
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin/model-comparison">
                        <i class="bi bi-diagram-3-fill"></i>
                        Model Comparison
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin/final-model">
                        <i class="bi bi-cpu-fill"></i>
                        Final Model
                    </a>
                </li>

            </ul>

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-danger fw-semibold" href="/logout">
                        <i class="bi bi-box-arrow-right"></i>
                        Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ================= MAIN CONTENT ================= -->
<main class="container-fluid px-4 py-4">
    {% block content %}
    {% endblock %}
</main>

<!-- ================= FOOTER ================= -->
<footer class="text-center text-muted">
    © {{ 2026 }} DDoS Detection System | Admin Module
</footer>

<!-- Bootstrap JS -->
<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>

{% block scripts %}{% endblock %}

</body>
</html>
