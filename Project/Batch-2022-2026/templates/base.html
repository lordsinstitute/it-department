<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engine Health Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- ================= HEADER ================= -->
<header class="app-header py-3">
    <div class="container d-flex align-items-center">
        <div>
            <h2 class="mb-0 fw-semibold">Vehicle Engine Health Prediction</h2>
            <small class="text-light">AI-Driven Predictive Maintenance System</small>
        </div>
    </div>
</header>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container">
        <div class="navbar-nav ms-auto">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
            <a class="nav-link {% if '/admin' in request.path %}active{% endif %}" href="/admin">Admin</a>
            <a class="nav-link {% if '/user' in request.path %}active{% endif %}" href="/user">User</a>
        </div>
    </div>
</nav>

<!-- ================= CONTENT ================= -->
<main class="flex-grow-1">
    {% block content %}{% endblock %}
</main>

<!-- ================= FOOTER ================= -->
<footer class="footer text-center py-3 mt-auto">
    © 2026 Vehicle Engine Health Prediction System
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
