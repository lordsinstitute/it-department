<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Image Forgery Detection</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #eef2f3, #dfe9f3);
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            padding: 25px;
            color: white;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background-color: #0f3057;
            padding: 12px 0;
        }

        .navbar-nav .nav-link {
            color: white !important;
            margin: 0 15px;
            position: relative;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        /* Hover underline animation */
        .navbar-nav .nav-link::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            left: 0;
            bottom: -5px;
            background: #00d4ff;
            transition: 0.3s ease;
        }

        .navbar-nav .nav-link:hover {
            color: #00d4ff !important;
            transform: translateY(-2px);
        }

        .navbar-nav .nav-link:hover::after {
            width: 100%;
        }

        /* ===== CARD STYLE ===== */
        .card-modern {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: 0.3s ease;
        }

        .card-modern:hover {
            transform: translateY(-5px);
        }

        /* ===== BUTTON STYLE ===== */
        .btn-primary {
            background: linear-gradient(90deg, #1e90ff, #00c6ff);
            border: none;
            border-radius: 30px;
            padding: 10px 35px;
            font-weight: 500;
            transition: 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        /* ===== IMAGE STYLE ===== */
        .uploaded-image {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: 0.3s ease;
        }

        .uploaded-image:hover {
            transform: scale(1.02);
        }

        /* ===== PREDICTION TEXT ===== */
        .prediction-text {
            font-size: 24px;
            font-weight: 600;
        }

        .fake { color: #dc3545; }
        .real { color: #28a745; }

        /* ===== PROGRESS BAR ===== */
        .progress {
            height: 25px;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar {
            font-weight: 500;
            transition: width 1s ease-in-out;
        }
    </style>
</head>

<body>

<div class="header">
    Digital Image Forgery Detection Using Deep Learning
</div>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <div class="navbar-nav mx-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/cnn-performance">CNN Performance</a>
            <a class="nav-link" href="/mobilenet-performance">Mobilenet Performance</a>
            <a class="nav-link" href="/predict">Predict</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
