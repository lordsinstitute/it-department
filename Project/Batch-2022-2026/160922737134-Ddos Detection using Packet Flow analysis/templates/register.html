{% extends "base.html" %}
{% set title = "Register - PacketFlow Guard" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <h4 class="mb-3 fw-bold">Create Account</h4>

        <form method="post" autocomplete="off">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input name="username" class="form-control" placeholder="e.g. admin" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" placeholder="min 8 chars" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input name="confirm" type="password" class="form-control" required>
          </div>

          <button class="btn btn-dark w-100">Register</button>
        </form>

        <div class="mt-3 text-center small">
          Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
