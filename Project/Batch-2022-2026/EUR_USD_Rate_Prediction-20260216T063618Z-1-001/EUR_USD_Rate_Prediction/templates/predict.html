{% extends "base.html" %}
{% block content %}
<div class="card p-4">
<h3>Predict Closing Price</h3>
<form method="POST" class="mt-3">
<div class="mb-3">
<label>Close Price</label>
<input type="number" step="0.0001" name="close" class="form-control" required>
</div>
<div class="mb-3">
<label>SMA 20</label>
<input type="number" step="0.0001" name="sma" class="form-control" required>
</div>
<div class="mb-3">
<label>EMA 20</label>
<input type="number" step="0.0001" name="ema" class="form-control" required>
</div>
<button class="btn btn-primary">Predict</button>
</form>


{% if prediction %}
<div class="alert alert-success mt-4">
<strong>Predicted Closing Price:</strong> {{ prediction }}
</div>
{% endif %}
</div>
{% endblock %}
