{% extends 'base.html' %}
{% block content %}
<div class="card p-5 text-center shadow-sm">
  <h2 class="text-primary fw-bold mb-4">Analyze Face from Image</h2>
  <p class="text-secondary">Upload a clear frontal face image to detect ethnicity, gender, and age.</p>

  <form action="{{ url_for('predict') }}" method="post" enctype="multipart/form-data" class="mt-4">
    <div class="mb-3 d-flex justify-content-center">
      <input type="file" name="file" class="form-control" style="max-width: 400px;" accept="image/*" required onchange="previewImage(event)">
    </div>
    <div id="preview-container" class="mb-4" style="display:none;">
      <img id="preview" src="#" alt="Preview" class="img-thumbnail" style="max-width:300px;">
    </div>
    <button type="submit" class="btn btn-primary px-4 py-2">Predict</button>
  </form>

  {% if error %}
  <div class="mt-4 text-danger fw-semibold">{{ error }}</div>
  {% endif %}
</div>

<script>
  function previewImage(event) {
    const output = document.getElementById('preview');
    const container = document.getElementById('preview-container');
    output.src = URL.createObjectURL(event.target.files[0]);
    container.style.display = 'block';
  }
</script>
{% endblock %}
