{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center p-5">
                <h2 class="fw-bold text-danger mb-3">Safe Error Handling</h2>
                <p class="text-muted">{{ message }}</p>
                <a href="{{ url_for('dashboard') if session.get('user_id') else url_for('login') }}" class="btn btn-dark">
                    Return
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
