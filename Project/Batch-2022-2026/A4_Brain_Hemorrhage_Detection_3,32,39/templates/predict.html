{% extends "base.html" %}
{% block content %}

<div class="card card-custom p-4">
    <h4 class="mb-3">Predict Brain Hemorrhage</h4>

    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <input type="file" name="image" class="form-control" required>
        </div>
        <button class="btn btn-custom">Predict</button>
    </form>
</div>

{% if prediction %}
<div class="card card-custom p-4 mt-4">
    <h5>Prediction Result</h5>

    {% if "No" in prediction %}
        <span class="badge-success">✔ {{ prediction }}</span>
    {% else %}
        <span class="badge-danger">⚠ {{ prediction }}</span>
    {% endif %}

    <p class="mt-3"><strong>Confidence:</strong> {{ confidence }}%</p>

    <img src="{{ img_path }}" class="img-fluid rounded mt-3" style="max-width:400px;">
</div>
{% endif %}

{% endblock %}
