{% extends 'base.html' %}
{% block content %}
<div class="upload-section text-center">
  <h4>Upload an Image for Prediction</h4>
  <form action="{{ url_for('predict') }}" method="POST" enctype="multipart/form-data" class="mt-4">
    <input type="file" name="file" class="form-control mb-3" accept="image/*" required>
    <button type="submit" class="btn btn-success">Analyze</button>
  </form>

  {% if error %}
    <div class="alert alert-danger mt-3">{{ error }}</div>
  {% endif %}
</div>
{% endblock %}
