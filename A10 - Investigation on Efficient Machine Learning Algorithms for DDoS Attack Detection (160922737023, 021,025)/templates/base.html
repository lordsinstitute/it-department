<!DOCTYPE html>
<html>
<head>
    <title>DDOS Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<div class="bg-dark text-white text-center py-3">
    <h2>DDOS Attack Detection System</h2>
    <p class="mb-0">Machine Learning based Network Security</p>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container">
        <a class="navbar-brand" href="/">Home</a>

        <div class="navbar-nav ms-auto">

            {% if session.get("role") == "admin" %}
                <a class="nav-link" href="/admin/eda">EDA</a>
                <a class="nav-link" href="/admin/compare">Compare Models</a>
                <a class="nav-link" href="/admin/final-model">Best Model</a>
                <a class="nav-link text-danger" href="/logout">Logout</a>

            {% elif session.get("role") == "user" %}
                <a class="nav-link" href="/user/predict">Predict</a>
                <a class="nav-link text-danger" href="/logout">Logout</a>

            {% else %}
                <a class="nav-link" href="/admin">Admin</a>
                <a class="nav-link" href="/user">User</a>
            {% endif %}

        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
